{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha | Sistema Läut</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #bca464; /* Fundo Dourado igual ao Login */
            font-family: 'Montserrat', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
        }
        .logo-login { max-height: 80px; width: auto; margin-bottom: 25px; }
        .btn-confirm {
            background-color: #1a1a1a; color: #d4a017; border: 2px solid #d4a017;
            width: 100%; padding: 12px; font-weight: 600; text-transform: uppercase;
        }
        .btn-confirm:hover { background-color: #333; color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{% static 'logo.png' %}" alt="Logo Läut" class="logo-login">
        
        {% if validlink %}
            <h5 class="mb-4 fw-bold" style="color: #1a1a1a;">Defina sua nova senha</h5>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold text-uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                            <small class="text-muted d-block mt-1" style="font-size: 0.7rem;">{{ field.help_text }}</small>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-confirm shadow-sm mt-2">ALTERAR SENHA</button>
            </form>
        {% else %}
            <div class="alert alert-danger">
                O link de redefinição é inválido ou expirou.
            </div>
            <a href="{% url 'login' %}" class="btn btn-dark w-100">VOLTAR AO LOGIN</a>
        {% endif %}
    </div>
</body>

<script>
    document.querySelectorAll('input').forEach(function(el){
        el.classList.add('form-control');
        el.classList.add('shadow-sm');
    });
</script>

</html>
