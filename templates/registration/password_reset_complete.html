{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida - App Vendedor</title>
    <style>
        /* Reutilizando o CSS do login.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Trebuchet MS', sans-serif; background: linear-gradient(135deg, #C1AB63, #7A6E3A); height: 100vh; display: flex; justify-content: center; align-items: center; color: #333; }
        .login-container { background-color: #fff; padding: 40px 30px 50px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); width: 100%; max-width: 380px; text-align: center; transition: transform 0.3s ease; }
        .login-container:hover { transform: translateY(-5px); }
        .login-container img { width: 110px; margin-bottom: 25px; user-select: none; }
        h2 { margin-bottom: 30px; font-weight: 700; font-size: 1.8rem; color: #4a4a4a; letter-spacing: 1px; }
        .info-text { font-size: 0.95rem; color: #555; margin-bottom: 25px; line-height: 1.5; }
        .info-text a {
            color: #7a6e3a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .info-text a:hover {
            color: #4a4623;
            text-decoration: underline;
        }

        /* Responsividade básica */
        @media (max-width: 400px) {
            .login-container { padding: 30px 20px 40px 20px; width: 95%; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{% static 'logo.png' %}" alt="Logo Laut" draggable="false" />
        <h2>Senha Redefinida com Sucesso!</h2>
        <p class="info-text">Sua senha foi definida. Você pode <a href="{% url 'login' %}">fazer login agora</a> com sua nova senha.</p>
    </div>
</body>
</html>
