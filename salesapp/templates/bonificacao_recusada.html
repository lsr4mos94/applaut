<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bonificação Recusada!</title>
    <style>
        /* Estilos básicos para o email para melhor visualização */
        body {
            font-family: 'Trebuchet MS', sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        h2 {
            color: #c1ab63; /* Usando sua cor principal */
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #c1ab63; /* Sua cor principal */
            color: white;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>SOLICITAÇÃO DE BONIFICAÇÃO RECUSADA!</h2>

        <p>A solicitação de bonificação para <strong>{{ bonificacao.razao_social }}</strong> (CNPJ/CPF: {{ bonificacao.cgc }}) foi <strong>RECUSADA</strong>.</p>

        <div class="motivo">
            <strong>Motivo:</strong><br>
            {{ motivo }}
        </div>

        <p style="margin-top: 30px; font-size: 0.9em; color: #999;">
            Este é um e-mail automático. Por favor, não responda diretamente.
        </p>
    </div>
</body>
</html>
