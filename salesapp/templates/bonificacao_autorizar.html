<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autorização de Bonificação</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4 text-green-600">Autorização de Bonificação</h1>
        
        <p class="text-gray-700 mb-2">Autorizar bonificação para:</p>
        <p class="text-xl font-semibold text-gray-900 mb-6">{{ bonificacao.razao_social }}</p>

        <p class="text-gray-600 mb-6">Tem certeza de que deseja confirmar esta ação? Esta operação não poderá ser desfeita.</p>

        <form method="POST" action="{{ action_url }}">
            {% csrf_token %}
            <p class="text-gray-600 mb-2">Observações (opcional):</p>
            <textarea name="obs" rows="3" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Adicione observações aqui..."></textarea>

            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button type="submit" class="bg-green-500 hover:bg-green-600 transition text-white font-bold py-2 px-6 rounded-lg shadow">
                    Autorizar
                </button>
                <button type="button" onclick="cancelarEFechar()" class="bg-gray-300 hover:bg-gray-400 transition text-gray-800 font-bold py-2 px-6 rounded-lg shadow">
                    Cancelar e fechar
                </button>
            </div>
        </form>

        <p class="text-sm text-gray-400 mt-6">Esta ação será registrada no sistema.</p>
    </div>

    <script>
        function cancelarEFechar() {
            window.close();
        }
    </script>

    </div>
</body>
</html>
