<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BONIFICAÇÃO JÁ PROCESSADA</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4 text-green-600">Bonificação processada</h1>

        <p>A solicitação de bonificação <strong>{{ bonificacao.id }}</strong> para <strong>{{ bonificacao.razao_social }}</strong> (CNPJ/CPF: {{ bonificacao.cgc }}) já foi processada e não pode ter seu status alterado.</p>

        <p class="text-gray-700 mt-6 text-xl font-semibold">
            Você pode fechar esta janela agora.
        </p>

    </div>
</body>
</html>
