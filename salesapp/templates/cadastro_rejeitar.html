<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Rejeição de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4 text-red-600">Rejeição de Cadastro</h1>

        <p class="text-gray-700 mb-2">Rejeitar o cadastro do cliente:</p>
        <p class="text-xl font-semibold text-gray-900 mb-6">{{ cadastro.razao_social }}</p>

        <p class="text-gray-600 mb-6">Por favor, informe o motivo da rejeição abaixo:</p>

        <form method="POST" action="{{ action_url }}"> {# Alterado: Usando action_url aqui #}
            {% csrf_token %}
            <textarea name="motivo_rejeicao" rows="5" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Motivo da rejeição..." required>{{ cadastro.motivo_rejeicao|default_if_none:"" }}</textarea>
            
            {% if erro_motivo %}
                <p class="text-red-500 text-sm mb-4">Por favor, preencha o motivo da rejeição.</p>
            {% endif %}

            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg shadow">
                    Confirmar Rejeição
                </button>
                <button type="button" onclick="cancelarEFechar()" class="bg-gray-300 hover:bg-gray-400 transition text-gray-800 font-bold py-2 px-6 rounded-lg shadow">
                    Cancelar e fechar
                </button>
            </div>
        </form>
    </div>

    <script>
        function cancelarEFechar() {
            window.close();
        }
    </script>

</body>
</html>
