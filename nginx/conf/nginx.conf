#user  nobody; # Geralmente 'nobody' ou o usuário com o qual o Nginx deve rodar
worker_processes  1; # Um processo worker é suficiente para a maioria dos casos

#error_log  logs/error.log; # Descomente para logs de erro
#pid        logs/nginx.pid; # Caminho para o arquivo PID do Nginx


events {
    worker_connections  1024;
}


http {
    server_names_hash_bucket_size 128; # Necessário para nomes de servidor longos

    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # =========================================================================
    # Bloco HTTP (porta 80) para o Certbot e Redirecionamento
    # =========================================================================
    server {
        listen 80;
        server_name appvendedores.duckdns.org; # SEU DOMÍNIO DUCKDNS AQUI!

        # Configuração para o Certbot validar o domínio via HTTP-01 challenge
        # O Certbot vai usar esta localização para servir um arquivo de validação.
        location ~ /.well-known/acme-challenge/ {
            root E:/applaut/nginx/html; # <--- VERIFIQUE ESTE CAMINHO! E CRIE A PASTA SE NAO EXISTIR
            allow all;
        }

        # Redireciona TODO o tráfego HTTP para HTTPS
        # O Certbot *deverá* ajustar isso, mas é bom ter como padrão.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Bloco HTTPS (porta 443) - O Certbot preencherá isso!
    # =========================================================================
    server {
        listen 443 ssl;
        server_name appvendedores.duckdns.org; # SEU DOMÍNIO DUCKDNS AQUI!

        # Estes caminhos serão preenchidos automaticamente pelo Certbot.
        # NÃO OS MODIFIQUE MANUALMENTE - DEIXE-OS ASSIM OU COMO COMENTÁRIO!
        ssl_certificate      E:/applaut/nginx/ssl/dummy.crt;
        ssl_certificate_key  E:/applaut/nginx/ssl/dummy.key;

        # Configurações SSL/TLS padrão (boas práticas de segurança)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy reverso para sua aplicação Django (Waitress)
        location / {
            proxy_pass http://127.0.0.1:8000; # Sua aplicação Django rodando localmente na porta 8000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect default;
        }

        # Opcional: Servir arquivos estáticos e de mídia diretamente pelo Nginx
        # location /static/ {
        #     alias E:/applaut/static/; # Adapte este caminho!
        # }
        # location /media/ {
        #     alias E:/applaut/media/;   # Adapte este caminho!
        # }
    }
}